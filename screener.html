<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL SCREENER</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="glass-panel">
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none;">
                <div class="logo glitch-text">TERMINAL SCREENER</div>
            </a>
            <div class="badge">V2.1 REVISION</div>
        </div>
        
        <div class="top-controls">
            <div class="control-group">
                <a href="index.html" class="btn-glass" style="text-decoration: none; border: 1px solid #ccc; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem;">&larr; HOME</a>
            </div>
            <div class="control-group">
                <label>COUNTRY:</label>
                <select id="countrySelect" class="glass-input">
                    <option value="america" selected>🇺🇸 USA</option>
                    <option value="uk">🇬🇧 GBR</option>
                    <option value="canada">🇨🇦 CAN</option>
                    <option value="germany">🇩🇪 DEU</option>
                    <option value="france">🇫🇷 FRA</option>
                    <option value="japan">🇯🇵 JPN</option>
                    <option value="india">🇮🇳 IND</option>
                </select>
            </div>
            <div class="control-group">
                <label>EXCHANGE:</label>
                <select id="exchangeSelect" class="glass-input">
                    <option value="ALL">ALL EXCHANGES</option>
                    <option value="NYSE" selected>NYSE</option>
                    <option value="NASDAQ">NASDAQ</option>
                    <option value="AMEX">AMEX</option>
                    <option value="OTC">OTC</option>
                </select>
            </div>
        </div>
    </header>

    <main>
        <aside class="sidebar glass-panel">
            <section class="module">
                <h3>ALGORITHMIC PRESETS</h3>
                <div class="premade-grid">
                    <button class="btn-glass active" data-id="top_gainers" title="Targets stocks with high momentum and volume growth">Top Gainers</button>
                    <button class="btn-glass" data-id="high_volume" title="Filters for stocks experiencing unusually high trading volume">High Volume</button>
                    <button class="btn-glass" data-id="oversold" title="Finds stocks that have dropped significantly and may rebound">Oversold Rebound</button>
                    <button class="btn-glass" data-id="growth_blue_chips" title="Large, stable companies showing consistent positive earnings">Blue Chip Growth</button>
                </div>
            </section>

            <section class="module advanced-filter">
                <h3>SEARCH FILTERS</h3>
                <button class="btn-glass primary-glow" id="openAdvancedFilter" title="Create a custom multi-metric query filter">Advanced Search</button>
            </section>

            <section class="module system-stats">
                <div class="stat-line">
                    <span class="stat-label">UPLINK:</span>
                    <span class="stat-value text-success pulse">SECURE</span>
                </div>
            </section>
        </aside>

        <section class="content-area glass-panel">
            <div class="results-header">
                <div class="status-box">
                    <div id="statusLine">AWAITING TELEMETRY...</div>
                </div>
                <div class="metric-badge" id="countLine">0 DATASETS</div>
            </div>

            <div class="table-wrapper">
                <table id="resultsTable">
                    <thead>
                        <tr id="tableHeaders">
                            <!-- Headers dynamically injected via JS -->
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Advanced Filter Modal -->
    <div class="modal-overlay" id="filterModal">
        <div class="modal-content glass-panel" style="width: 800px; max-width: 95%;">
            <header class="modal-header">
                <h3>Configure Search</h3>
                <button class="btn-close" id="closeFilterModal" style="font-size: 2.5rem; color: var(--danger); font-weight: bold; background: #fff; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">&times;</button>
            </header>
            <div class="modal-body" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
                <!-- Generating metrics grid -->
                <div class="filter-row">
                    <label style="font-family: var(--font-mono); font-size: 0.8rem; font-weight: bold;">PRICE</label>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <input type="hidden" class="f-field" value="close">
                        <select class="glass-input f-premade" style="flex: 1;">
                            <option value="any">Any</option><option value=">|1000">&gt; $1000</option><option value=">|200">&gt; $200</option><option value=">|100">&gt; $100</option><option value=">|10">&gt; $10</option><option value="custom">Custom</option>
                        </select>
                        <div class="f-custom-group" style="display: none; flex: 1; gap: 5px;">
                            <select class="glass-input f-op" style="flex: 1; padding: 5px;"><option value=">">></option><option value="<"><</option><option value=">=">>=</option><option value="<="><=</option></select>
                            <input type="number" class="glass-input f-val" placeholder="Val" style="flex: 2; padding: 5px;">
                        </div>
                    </div>
                </div>

                <div class="filter-row">
                    <label style="font-family: var(--font-mono); font-size: 0.8rem; font-weight: bold;">CHANGE %</label>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <input type="hidden" class="f-field" value="change">
                        <select class="glass-input f-premade" style="flex: 1;">
                            <option value="any">Any</option><option value=">|10">&gt; +10%</option><option value=">|5">&gt; +5%</option><option value="<|-5">&lt; -5%</option><option value="<|-10">&lt; -10%</option><option value="custom">Custom</option>
                        </select>
                        <div class="f-custom-group" style="display: none; flex: 1; gap: 5px;">
                            <select class="glass-input f-op" style="flex: 1; padding: 5px;"><option value=">">></option><option value="<"><</option><option value=">=">>=</option><option value="<="><=</option></select>
                            <input type="number" class="glass-input f-val" placeholder="Val" style="flex: 2; padding: 5px;">
                        </div>
                    </div>
                </div>

                <div class="filter-row">
                    <label style="font-family: var(--font-mono); font-size: 0.8rem; font-weight: bold;">MARKET CAP</label>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <input type="hidden" class="f-field" value="market_cap_basic">
                        <select class="glass-input f-premade" style="flex: 1;">
                            <option value="any">Any</option><option value=">|1000000000000">&gt; 1 Trillion</option><option value=">|100000000000">&gt; 100 Billion</option><option value=">|1000000000">&gt; 1 Billion</option><option value="<|1000000000">&lt; 1 Billion</option><option value="custom">Custom</option>
                        </select>
                        <div class="f-custom-group" style="display: none; flex: 1; gap: 5px;">
                            <select class="glass-input f-op" style="flex: 1; padding: 5px;"><option value=">">></option><option value="<"><</option><option value=">=">>=</option><option value="<="><=</option></select>
                            <input type="number" class="glass-input f-val" placeholder="Val" style="flex: 2; padding: 5px;">
                        </div>
                    </div>
                </div>

                <div class="filter-row">
                    <label style="font-family: var(--font-mono); font-size: 0.8rem; font-weight: bold;">P/E RATIO</label>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <input type="hidden" class="f-field" value="price_earnings_ttm">
                        <select class="glass-input f-premade" style="flex: 1;">
                            <option value="any">Any</option><option value="<|15">&lt; 15</option><option value="<|25">&lt; 25</option><option value=">|50">&gt; 50</option><option value=">|100">&gt; 100</option><option value="custom">Custom</option>
                        </select>
                        <div class="f-custom-group" style="display: none; flex: 1; gap: 5px;">
                            <select class="glass-input f-op" style="flex: 1; padding: 5px;"><option value=">">></option><option value="<"><</option><option value=">=">>=</option><option value="<="><=</option></select>
                            <input type="number" class="glass-input f-val" placeholder="Val" style="flex: 2; padding: 5px;">
                        </div>
                    </div>
                </div>

                <div class="filter-row">
                    <label style="font-family: var(--font-mono); font-size: 0.8rem; font-weight: bold;">DIVIDEND YIELD %</label>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <input type="hidden" class="f-field" value="dividend_yield_recent">
                        <select class="glass-input f-premade" style="flex: 1;">
                            <option value="any">Any</option><option value=">|1">&gt; 1%</option><option value=">|3">&gt; 3%</option><option value=">|5">&gt; 5%</option><option value=">|8">&gt; 8%</option><option value="custom">Custom</option>
                        </select>
                        <div class="f-custom-group" style="display: none; flex: 1; gap: 5px;">
                            <select class="glass-input f-op" style="flex: 1; padding: 5px;"><option value=">">></option><option value="<"><</option><option value=">=">>=</option><option value="<="><=</option></select>
                            <input type="number" class="glass-input f-val" placeholder="Val" style="flex: 2; padding: 5px;">
                        </div>
                    </div>
                </div>

                <div class="filter-row">
                    <label style="font-family: var(--font-mono); font-size: 0.8rem; font-weight: bold;">REV GROWTH YoY %</label>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <input type="hidden" class="f-field" value="total_revenue_yoy_growth_ttm">
                        <select class="glass-input f-premade" style="flex: 1;">
                            <option value="any">Any</option><option value=">|5">&gt; +5%</option><option value=">|20">&gt; +20%</option><option value=">|50">&gt; +50%</option><option value="custom">Custom</option>
                        </select>
                        <div class="f-custom-group" style="display: none; flex: 1; gap: 5px;">
                            <select class="glass-input f-op" style="flex: 1; padding: 5px;"><option value=">">></option><option value="<"><</option><option value=">=">>=</option><option value="<="><=</option></select>
                            <input type="number" class="glass-input f-val" placeholder="Val" style="flex: 2; padding: 5px;">
                        </div>
                    </div>
                </div>

                <div class="filter-row">
                    <label style="font-family: var(--font-mono); font-size: 0.8rem; font-weight: bold;">ROE %</label>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <input type="hidden" class="f-field" value="return_on_equity">
                        <select class="glass-input f-premade" style="flex: 1;">
                            <option value="any">Any</option><option value=">|5">&gt; 5%</option><option value=">|15">&gt; 15%</option><option value=">|30">&gt; 30%</option><option value="custom">Custom</option>
                        </select>
                        <div class="f-custom-group" style="display: none; flex: 1; gap: 5px;">
                            <select class="glass-input f-op" style="flex: 1; padding: 5px;"><option value=">">></option><option value="<"><</option><option value=">=">>=</option><option value="<="><=</option></select>
                            <input type="number" class="glass-input f-val" placeholder="Val" style="flex: 2; padding: 5px;">
                        </div>
                    </div>
                </div>

                <div class="filter-row">
                    <label style="font-family: var(--font-mono); font-size: 0.8rem; font-weight: bold;">BETA (1 Year)</label>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <input type="hidden" class="f-field" value="beta_1_year">
                        <select class="glass-input f-premade" style="flex: 1;">
                            <option value="any">Any</option><option value="<|1">&lt; 1</option><option value=">|1">&gt; 1</option><option value=">|2">&gt; 2</option><option value="custom">Custom</option>
                        </select>
                        <div class="f-custom-group" style="display: none; flex: 1; gap: 5px;">
                            <select class="glass-input f-op" style="flex: 1; padding: 5px;"><option value=">">></option><option value="<"><</option><option value=">=">>=</option><option value="<="><=</option></select>
                            <input type="number" class="glass-input f-val" placeholder="Val" style="flex: 2; padding: 5px;">
                        </div>
                    </div>
                </div>

                <div style="grid-column: 1 / -1;">
                    <button class="btn-glass primary-glow" id="executeAdvancedScan" style="margin-top: 20px; width: 100%; text-align: center; font-size: 1.2rem; padding: 15px;">Execute Search</button>
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner">
            <div class="double-bounce1"></div>
            <div class="double-bounce2"></div>
        </div>
        <div class="loading-text glitch-text">EXTRACTING...</div>
    </div>

    <script type="module" src="/src/screener.ts"></script>
</body>
</html>
